- name: Install and configure Nginx on AWS and Azure
  hosts: all
  become: true

  tasks:
    - name: Update package cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install Nginx (Debian/Ubuntu)
      apt:
        name: nginx
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Nginx (RedHat/Amazon Linux)
      yum:
        name: nginx
        state: present
      when: ansible_os_family == "RedHat"

    - name: Ensure Nginx service is enabled and started
      service:
        name: nginx
        state: started
        enabled: yes

    # Copy custom index.html depending on group
    - name: Copy AWS index.html
      copy:
        src: index-aws.html
        dest: /var/www/html/index.html
      when: "'aws' in group_names"

    - name: Copy Azure index.html
      copy:
        src: index-azure.html
        dest: /var/www/html/index.html
      when: "'azure' in group_names"

    - name: Verify Nginx is serving custom page
      uri:
        url: "http://{{ ansible_host }}"
        return_content: yes
      register: nginx_response

    - name: Check if AWS welcome text is present
      assert:
        that:
          - "'Welcome to AWS' in nginx_response.content"
        fail_msg: "AWS Nginx page not updated"
        success_msg: "AWS Nginx page updated successfully"
      when: "'aws' in group_names"

    - name: Check if Azure welcome text is present
      assert:
        that:
          - "'Welcome to Azure' in nginx_response.content"
        fail_msg: "Azure Nginx page not updated"
        success_msg: "Azure Nginx page updated successfully"
      when: "'azure' in group_names"
